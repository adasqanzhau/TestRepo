{% macro lang_switcher(css_class='') %}
<div class="lang-switcher dropdown {{ css_class }}">
    <button class="btn btn-lang dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false"
            title="{{ _('common.language') }}">
        <i class="fas fa-globe me-1"></i>
        <span class="lang-code">{{ current_locale|upper }}</span>
    </button>
    <ul class="dropdown-menu dropdown-menu-end shadow-sm">
        {% for code, label in supported_locales.items() %}
        <li>
            <a class="dropdown-item d-flex align-items-center justify-content-between {% if code == current_locale %}active{% endif %}"
               href="{{ url_for('locale.set_language', lang=code, next=request.url) }}">
                <span>{{ label }}</span>
                {% if code == current_locale %}<i class="fas fa-check text-primary ms-2"></i>{% endif %}
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endmacro %}
